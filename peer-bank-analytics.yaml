AWSTemplateFormatVersion: '2010-09-09'
Description: 'Banking Peer Analytics - One-Click Deploy'

Parameters:
  StackName:
    Type: String
    Default: banking-analytics
    Description: Name for your banking analytics deployment
  
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Banking Analytics Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ListFoundationModels
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t2.micro
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y docker git
          service docker start
          git clone https://github.com/AWS-Samples-GenAI-FSI/peer-bank-analytics.git /home/ec2-user/app
          cd /home/ec2-user/app
          cat > Dockerfile << 'EOF'
          FROM python:3.9
          WORKDIR /app
          COPY . /app
          RUN pip install -r requirements.txt
          EXPOSE 8501
          ENV AWS_DEFAULT_REGION=${AWS::Region}
          ENV BEDROCK_MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0
          CMD ["streamlit", "run", "1_🏠_Home.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.enableCORS=false"]
          EOF
          docker build -t banking-app .
          docker run -d -p 80:8501 banking-app
          sleep 60
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT15M

Outputs:
  ApplicationURL:
    Description: Banking Analytics Application
    Value: !Sub 'http://${Instance.PublicIp}'