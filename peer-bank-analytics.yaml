AWSTemplateFormatVersion: '2010-09-09'
Description: 'Banking Peer Analytics - Real-time FDIC & SEC Data with Streaming AI Analysis'

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    


Resources:
  GetMyIP:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt GetMyIPFunction.Arn
  
  GetMyIPFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import cfnresponse
          
          def handler(event, context):
              try:
                  print(f'Event: {event}')
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  # Get public IP
                  print('Getting public IP...')
                  response = urllib.request.urlopen('https://checkip.amazonaws.com')
                  ip = response.read().decode('utf-8').strip()
                  print(f'Got IP: {ip}')
                  
                  response_data = {'IP': ip}
                  print(f'Sending response: {response_data}')
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              except Exception as e:
                  print(f'Error: {e}')
                  import traceback
                  traceback.print_exc()
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})
  
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
  

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Banking Analytics Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Sub '${GetMyIP.IP}/32'
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Sub '${GetMyIP.IP}/32'

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ConverseStream
                  - bedrock:Converse
                  - bedrock:ListFoundationModels
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.medium
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          # Log everything for debugging
          exec > >(tee -a /var/log/setup.log) 2>&1
          echo "Starting setup at $(date)"
          
          # Update system and install dependencies
          yum update -y
          yum install -y git python3-pip curl
          
          # Clone repository
          echo "Cloning repository..."
          git clone https://github.com/AWS-Samples-GenAI-FSI/peer-bank-analytics.git /home/ec2-user/app || {
            echo "Git clone failed"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
            exit 1
          }
          
          cd /home/ec2-user/app
          chown -R ec2-user:ec2-user /home/ec2-user/app
          
          # Install dependencies
          echo "Installing Python dependencies..."
          pip3 install -r requirements.txt || {
            echo "Pip install failed"
            cat requirements.txt
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
            exit 1
          }
          
          # Create streamlit config
          mkdir -p .streamlit
          cat > .streamlit/config.toml << 'EOF'
          [server]
          headless = true
          port = 8501
          address = "0.0.0.0"
          enableCORS = false
          
          [browser]
          gatherUsageStats = false
          EOF
          
          # Set environment variables
          export AWS_DEFAULT_REGION=${AWS::Region}
          export BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
          
          # Test streamlit installation
          echo "Testing streamlit..."
          python3 -c "import streamlit; print('Streamlit OK')" || {
            echo "Streamlit import failed"
            /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
            exit 1
          }
          
          # Start application
          echo "Starting application..."
          nohup python3 -m streamlit run "1_🏠_Home.py" --server.port=8501 --server.address=0.0.0.0 --server.headless=true > /var/log/streamlit.log 2>&1 &
          
          # Setup port forwarding
          iptables -t nat -A PREROUTING -p tcp --dport 80 -j REDIRECT --to-port 8501
          
          # Wait for application with comprehensive debugging
          echo "Waiting for application to start..."
          for i in {1..24}; do
            if curl -f http://localhost:8501 2>/dev/null | grep -q "Banking\|Streamlit\|html"; then
              echo "✅ Application is ready on port 8501"
              /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
              exit 0
            fi
            echo "⏳ Waiting for application... ($i/24)"
            sleep 5
          done
          
          # Comprehensive failure debugging
          echo "❌ Application failed to start. Debug info:"
          echo "=== Setup Log ==="
          tail -50 /var/log/setup.log
          echo "=== Streamlit Log ==="
          tail -50 /var/log/streamlit.log
          echo "=== Process Status ==="
          ps aux | grep -E "streamlit|python"
          echo "=== Port Status ==="
          netstat -tlnp | grep -E ":8501|:80"
          echo "=== Directory Contents ==="
          ls -la /home/ec2-user/app/
          echo "=== Python Path ==="
          python3 -c "import sys; print('\n'.join(sys.path))"
          
          /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT10M

Outputs:
  ApplicationURL:
    Description: Banking Analytics Application
    Value: !Sub 'http://${Instance.PublicIp}'
  
  LoginCredentials:
    Description: "🔐 IMPORTANT: Use these credentials to login to the application"
    Value: "Username: awsuser | Password: Password123$"
  
  Features:
    Description: "✨ New Features Available"
    Value: "Real-time FDIC API data | Live SEC filings | Streaming AI analysis | 10-K/10-Q reports | Peer comparisons"
  
  Instructions:
    Description: "📋 How to access your Banking Analytics application"
    Value: "1. Open the Application URL above | 2. Use the Login Credentials to authenticate | 3. Start analyzing banking data!"