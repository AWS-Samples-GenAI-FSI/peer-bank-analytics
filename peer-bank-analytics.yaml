AWSTemplateFormatVersion: '2010-09-09'
Description: 'Banking Peer Analytics - Real-time FDIC & SEC Data with Streaming AI Analysis'

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    


Resources:
  GetMyIP:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt GetMyIPFunction.Arn
  
  GetMyIPFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import cfnresponse
          
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  # Get public IP
                  response = urllib.request.urlopen('https://checkip.amazonaws.com')
                  ip = response.read().decode('utf-8').strip()
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'IP': ip})
              except Exception as e:
                  print(f'Error: {e}')
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})
  
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
  

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Banking Analytics Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Sub '${GetMyIP.IP}/32'
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Sub '${GetMyIP.IP}/32'

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ConverseStream
                  - bedrock:Converse
                  - bedrock:ListFoundationModels
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.small
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
          
          # Update system
          yum update -y
          yum install -y docker git python3-pip
          
          # Start Docker
          systemctl start docker
          systemctl enable docker
          usermod -a -G docker ec2-user
          
          # Clone repository
          git clone https://github.com/AWS-Samples-GenAI-FSI/peer-bank-analytics.git /home/ec2-user/app
          cd /home/ec2-user/app
          chown -R ec2-user:ec2-user /home/ec2-user/app
          
          # Create authentication config
          cat > .streamlit/config.toml << 'CONFIGEOF'
          [server]
          headless = true
          port = 8501
          address = "0.0.0.0"
          enableCORS = false
          
          [browser]
          gatherUsageStats = false
          CONFIGEOF
          
          # Create simple auth wrapper
          cat > auth_wrapper.py << 'AUTHEOF'
          import streamlit as st
          import os
          import hashlib
          
          def check_auth():
              if "authenticated" not in st.session_state:
                  st.session_state.authenticated = False
              
              if not st.session_state.authenticated:
                  st.title("🏦 Banking Analytics - Authentication Required")
                  st.warning("This application contains sensitive financial data. Please authenticate to continue.")
                  
                  username = st.text_input("Username")
                  password = st.text_input("Password", type="password")
                  
                  if st.button("Login"):
                      # Simple demo auth - replace with proper authentication
                      if username == "awsuser" and password == "Password123$":
                          st.session_state.authenticated = True
                          st.rerun()
                      else:
                          st.error("Invalid credentials")
                  
                  st.info("Demo credentials: username=awsuser, password=Password123$")
                  return False
              return True
          AUTHEOF
          
          # Create optimized Dockerfile
          cat > Dockerfile << 'EOF'
          FROM python:3.9-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          RUN mkdir -p .streamlit
          EXPOSE 8501
          ENV AWS_DEFAULT_REGION=${AWS::Region}
          ENV BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
          HEALTHCHECK --interval=30s --timeout=10s --start-period=60s --retries=3 \
            CMD curl -f http://localhost:8501/_stcore/health || exit 1
          CMD ["streamlit", "run", "1_🏠_Home.py"]
          EOF
          
          # Build and run application
          docker build -t banking-app . || { echo "Docker build failed"; exit 1; }
          docker run -d -p 80:8501 --name banking-container --restart unless-stopped banking-app || { echo "Docker run failed"; exit 1; }
          
          # Wait for application to be ready
          for i in {1..30}; do
            if curl -f http://localhost:80/_stcore/health 2>/dev/null; then
              echo "Application is ready"
              /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 10
          done
          
          echo "Application failed to start"
          /opt/aws/bin/cfn-signal -e 1 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT20M

Outputs:
  ApplicationURL:
    Description: Banking Analytics Application
    Value: !Sub 'http://${Instance.PublicIp}'
  
  LoginCredentials:
    Description: "🔐 IMPORTANT: Use these credentials to login to the application"
    Value: "Username: awsuser | Password: Password123$"
  
  Features:
    Description: "✨ New Features Available"
    Value: "Real-time FDIC API data | Live SEC filings | Streaming AI analysis | 10-K/10-Q reports | Peer comparisons"
  
  Instructions:
    Description: "📋 How to access your Banking Analytics application"
    Value: "1. Open the Application URL above | 2. Use the Login Credentials to authenticate | 3. Start analyzing banking data!"