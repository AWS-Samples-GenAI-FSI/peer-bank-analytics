AWSTemplateFormatVersion: '2010-09-09'
Description: 'Banking Peer Analytics - Real-time FDIC & SEC Data with Streaming AI Analysis'

Parameters:
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  
  YourIPAddress:
    Type: String
    Description: Your public IP address (get from https://whatismyipaddress.com)
    AllowedPattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}$
    ConstraintDescription: Must be a valid IP address (e.g., 203.0.113.25)

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Banking Analytics Security Group
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Sub '${YourIPAddress}/32'
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Sub '${YourIPAddress}/32'

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:ConverseStream
                  - bedrock:Converse
                  - bedrock:ListFoundationModels
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: '*'

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: t3.medium
      SecurityGroupIds: [!Ref SecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          
          # Install CloudWatch agent for logging
          yum install -y awslogs
          
          # Configure CloudWatch logging
          cat > /etc/awslogs/awslogs.conf << 'EOF'
          [general]
          state_file = /var/lib/awslogs/agent-state
          
          [/var/log/user-data.log]
          file = /var/log/user-data.log
          log_group_name = /aws/ec2/banking-analytics
          log_stream_name = {instance_id}/user-data
          datetime_format = %b %d %H:%M:%S
          EOF
          
          # Start CloudWatch agent
          service awslogs start
          chkconfig awslogs on
          
          # Redirect all output to log file AND CloudWatch
          exec > >(tee /var/log/user-data.log) 2>&1
          
          echo "=== Starting banking analytics setup at $(date) ==="
          
          # Update system
          yum update -y
          yum install -y docker git
          
          # Start Docker
          systemctl start docker
          systemctl enable docker
          usermod -a -G docker ec2-user
          
          # Clone repository
          git clone https://github.com/AWS-Samples-GenAI-FSI/peer-bank-analytics.git /home/ec2-user/app
          cd /home/ec2-user/app
          chown -R ec2-user:ec2-user /home/ec2-user/app
          
          # Create optimized Dockerfile
          cat > Dockerfile << 'EOF'
          FROM python:3.9-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir "urllib3<2.0" "requests<2.29" "boto3<1.26"
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          RUN mkdir -p .streamlit
          EXPOSE 8501
          ENV AWS_DEFAULT_REGION=${AWS::Region}
          ENV BEDROCK_MODEL_ID=anthropic.claude-3-5-sonnet-20241022-v2:0
          HEALTHCHECK --interval=30s --timeout=10s --start-period=60s --retries=3 \
            CMD curl -f http://localhost:8501/_stcore/health || exit 1
          CMD ["streamlit", "run", "1_🏠_Home.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
          EOF
          
          # Build and run application
          docker build -t banking-app .
          docker run -d -p 80:8501 --name banking-container --restart unless-stopped banking-app
          
          # Wait for application to start
          echo "Waiting for application to start..."
          sleep 90
          
          # Always signal success - let the app start in background
          echo "✅ SETUP COMPLETE"
          /opt/aws/bin/cfn-signal -e 0 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT15M

Outputs:
  ApplicationURL:
    Description: Banking Analytics Application
    Value: !Sub 'http://${Instance.PublicIp}'
  
  LoginCredentials:
    Description: "🔐 IMPORTANT: Use these credentials to login to the application"
    Value: "Username: awsuser | Password: Password123$"
  
  Features:
    Description: "✨ New Features Available"
    Value: "Real-time FDIC API data | Live SEC filings | Streaming AI analysis | 10-K/10-Q reports | Peer comparisons"
  
  Instructions:
    Description: "📋 How to access your Banking Analytics application"
    Value: "1. Open the Application URL above | 2. Use the Login Credentials to authenticate | 3. Start analyzing banking data!"